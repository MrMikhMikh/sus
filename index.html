<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Тур Центротех</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<link rel="stylesheet" href="style.css">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#000;
}

#loader{
position:fixed;
bottom:120px;
left:50%;
transform:translateX(-50%);
background:white;
padding:15px 25px;
border-radius:10px;
font-size:16px;
}

#ui{
position:fixed;
bottom:30px;
width:100%;
display:flex;
justify-content:center;
}

button{
padding:15px 30px;
font-size:18px;
background:#1976ff;
color:white;
border:none;
border-radius:10px;
}
</style>

</head>

<body>

<div id="loader">
Загрузка AR...
</div>

<div id="ui">
<button onclick="nextStep()">Следующий этап</button>
</div>

<a-scene
embedded
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false"
>

<a-camera position="0 1.6 0"></a-camera>

<a-box
position="0 1 -3"
rotation="0 45 0"
color="#4CC3D9"
animation="property: rotation; to: 0 405 0; loop: true; dur: 6000">
</a-box>

<a-text
value="Центрик AR Тур"
position="-1 2 -3"
color="white"
width="4">
</a-text>

</a-scene>

<script src="script.js"></script>

</body>
</html>
