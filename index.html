<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AR Центрик Тур</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

#ui{
position:fixed;
bottom:30px;
width:100%;
display:flex;
justify-content:center;
}

button{
padding:15px 25px;
font-size:18px;
background:#1976ff;
color:white;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<video id="camera" autoplay playsinline></video>

<div id="ui">
<button onclick="nextStep()">Следующий этап</button>
</div>

<a-scene embedded>

<a-box
position="0 1 -3"
color="red"
animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
</a-box>

<a-text
value="Центрик AR Тур"
position="-1 2 -3"
color="white"
width="4">
</a-text>

<a-entity camera></a-entity>

</a-scene>

<script>

const video = document.getElementById("camera")

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(stream=>{
video.srcObject = stream
})
.catch(err=>{
alert("Не удалось получить доступ к камере")
})

let step = 0

function nextStep(){

step++

const stages = [
"Добро пожаловать на завод Центротех!",
"Ценность 1: Безопасность",
"Ценность 2: Ответственность",
"Ценность 3: Уважение",
"Ценность 4: Команда",
"Ценность 5: Эффективность",
"Все ценности собраны!"
]

if(step < stages.length){
alert(stages[step])
}

}

</script>

</body>
</html>
