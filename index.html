<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AR Тур Центрик</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#loader{
position:fixed;
bottom:120px;
left:50%;
transform:translateX(-50%);
background:white;
padding:12px 25px;
border-radius:10px;
}

#ui{
position:fixed;
bottom:30px;
width:100%;
display:flex;
justify-content:center;
}

button{
padding:15px 25px;
font-size:18px;
background:#1976ff;
color:white;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<div id="loader">
Загрузка AR...
</div>

<div id="ui">
<button onclick="nextStep()">Следующий этап</button>
</div>

<a-scene
embedded
arjs="sourceType: webcam; debugUIEnabled: false;"
vr-mode-ui="enabled: false"
>

<a-marker preset="hiro">

<a-box
position="0 0.5 0"
color="red"
animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
</a-box>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script src="script.js"></script>

</body>
</html>
