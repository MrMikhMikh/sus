<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AR Тур</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#ui{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
}

button{
padding:15px 30px;
font-size:18px;
background:#1976ff;
color:white;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<div id="ui">
<button onclick="nextStep()">Следующий этап</button>
</div>

<a-scene
embedded
arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
vr-mode-ui="enabled: false"
renderer="logarithmicDepthBuffer: true;"
>

<a-marker preset="hiro">

<a-box
position="0 0.5 0"
color="red"
animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
</a-box>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

let step = 0

function nextStep(){

step++

const stages = [
"Добро пожаловать на завод!",
"Ценность 1: Безопасность",
"Ценность 2: Ответственность",
"Ценность 3: Команда",
"Ценность 4: Эффективность",
"Все ценности собраны!"
]

if(step < stages.length){
alert(stages[step])
}

}

</script>

</body>
</html>
