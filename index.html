<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AR тур Центрик</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<button id="start">Запустить AR</button>

<!-- круговая шкала -->

<div id="progressCircle">
<div id="circle">
<div id="percent">0%</div>
</div>
</div>

<!-- Центрик -->

<div id="centrikBox">

<img id="centrik" src="assets/centrik.png">

<div id="speech">
Привет! Я Центрик. Нажми "Следующая точка", чтобы начать экскурсию.
</div>

</div>

<!-- камера -->

<video id="camera" autoplay playsinline></video>

<!-- кнопка -->

<div id="ui">
<button id="next">Следующая точка</button>
</div>

<script src="script.js"></script>

</body>
</html>
