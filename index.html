<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Центрик AR Тур</title>

<link rel="stylesheet" href="style.css">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

</head>

<body>

<button id="start">Запустить AR</button>

<!-- Круговая шкала -->
<div id="progressCircle">

<div id="circle">
<div id="percent">0%</div>
</div>

</div>

<!-- Центрик -->

<div id="centrikBox">

<img id="centrik" src="assets/centrik.png">

<div id="speech">
Привет! Я Центрик. Нажми "Следующая точка", чтобы начать экскурсию.
</div>

</div>

<video id="camera" autoplay playsinline></video>

<div id="ui">
<button id="next">Следующая точка</button>
</div>

<a-scene embedded>

<a-assets>
<a-asset-item id="machine" src="assets/machine.glb"></a-asset-item>
</a-assets>

<a-light type="ambient" intensity="1"></a-light>

<a-light
type="directional"
position="1 3 2"
intensity="1.2">
</a-light>

<a-entity
id="machineModel"
gltf-model="#machine"
scale="0.2 0.2 0.2"
position="0 -0.5 -4"
rotation="-90 180 0">
</a-entity>

<a-entity camera></a-entity>

</a-scene>

<script src="script.js"></script>

</body>
</html>
