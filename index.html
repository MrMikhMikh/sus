<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Центрик AR Тур</title>

<link rel="stylesheet" href="style.css">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

</head>

<body>

<button id="start">Запустить AR</button>

<div id="centrikBox">

<img id="centrik" src="assets/centrik.png">

<div id="speech">
Привет, я Центрик!
</div>

</div>

<video id="camera" autoplay playsinline></video>

<div id="ui">
<button id="next">Следующий этап</button>
</div>

<script>

const startBtn = document.getElementById("start")
const video = document.getElementById("camera")

startBtn.onclick = async () => {

try{

const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

video.srcObject = stream
video.style.display = "block"
startBtn.style.display = "none"

}catch(e){

alert("Не удалось получить доступ к камере")

}

}

let step = 0

const stages = [

"Добро пожаловать на завод Центротех!",

"Ценность 1: Безопасность",

"Ценность 2: Ответственность",

"Ценность 3: Уважение",

"Ценность 4: Единая команда",

"Ценность 5: Эффективность",

"Ценность 6: На шаг впереди"

]

document.getElementById("next").onclick = () => {

step++

if(step < stages.length){

alert(stages[step])

}else{

alert("Экскурсия завершена!")

}

}

</script>

<a-scene embedded>

<a-assets>
<a-asset-item id="machine" src="assets/machine.glb"></a-asset-item>
</a-assets>

<a-entity
gltf-model="#machine"
position="0 0 -3"
scale="0.4 0.4 0.4"
rotation="0 180 0">
</a-entity>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
