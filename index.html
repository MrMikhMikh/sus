<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>AR тур Центрик</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="ui">
<button onclick="nextStep()">Следующий этап</button>
</div>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
color-space="sRGB"
embedded
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false"
>

<a-assets>

<img id="centrik" src="assets/centrik.png">
<img id="img1" src="assets/1.jpg">
<img id="img2" src="assets/2.jpg">
<img id="img3" src="assets/3.jpg">
<img id="img4" src="assets/4.jpg">
<img id="img5" src="assets/5.jpg">
<img id="img6" src="assets/6.jpg">

</a-assets>

<a-camera position="0 0 0"></a-camera>

<a-entity id="centrikEntity">

<a-image
src="#centrik"
position="0 0 -2"
scale="1 1.4 1">
</a-image>

<a-image
id="factoryImage"
src="#img1"
position="0 1 -2"
scale="1.5 1 1">
</a-image>

<a-text
id="text"
value="Добро пожаловать на завод!"
align="center"
position="0 -0.8 -2"
color="white">
</a-text>

</a-entity>

</a-scene>

<script src="script.js"></script>

</body>
</html>
