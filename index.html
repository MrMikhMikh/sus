<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Центрик</title>

<link rel="stylesheet" href="style.css">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

</head>

<body>

<!-- инструкция -->

<div id="startText">
Нажмите на AR и сканируйте QR коды
</div>

<a-scene
embedded
arjs="sourceType: webcam; debugUIEnabled: false;"
>

<a-assets>

<img id="centrikImg" src="assets/centrik.png">

</a-assets>

<!-- ТВОЙ QR МАРКЕР -->

<a-marker type="pattern" url="assets/marker.patt">

<!-- Центрик -->

<a-plane
src="#centrikImg"
position="0 0.8 0"
rotation="-90 0 0"
width="1"
height="1">
</a-plane>

<!-- текст -->

<a-text
value="Привет!\nТут техника безопасности превыше всего.\nОдевай СИЗ!"
align="center"
color="#ffffff"
position="0 1.7 0"
rotation="-90 0 0"
width="4">
</a-text>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
