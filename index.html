<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Центрик</title>

<link rel="stylesheet" href="style.css">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

</head>

<body>

<!-- экран запуска -->

<div id="startScreen">

<h2>Нажмите AR и сканируйте QR-коды</h2>

<button id="startAR">
Запустить AR
</button>

</div>

<!-- прогресс -->

<div id="progress">

<div id="circle">
<div id="percent">0%</div>
</div>

</div>

<!-- диалог -->

<div id="dialog">
<div id="text"></div>
</div>

<!-- AR сцена -->

<a-scene
id="scene"
embedded
arjs="sourceType: webcam; debugUIEnabled:false;"
style="display:none"
>

<a-assets>

<img id="centrikImg" src="assets/centrik.png">

</a-assets>

<a-marker type="pattern" url="assets/marker.patt">

<a-image
src="#centrikImg"
position="0 0.4 0"
scale="0.2 0.2 0.2">
</a-image>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script src="script.js"></script>

</body>
</html>
