<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Центрик AR Тур</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
overflow:hidden;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

#start{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;
font-size:20px;
background:#1976ff;
color:white;
border:none;
border-radius:10px;
z-index:10;
}

#ui{
position:fixed;
bottom:30px;
width:100%;
display:flex;
justify-content:center;
z-index:10;
}

#next{
padding:15px 25px;
font-size:18px;
background:#1976ff;
color:white;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<button id="start">Запустить AR</button>

<div id="centrikBox">

<img id="centrik" src="assets/centrik.png">

<div id="speech">
Привет, я Центрик!
</div>

</div>

<video id="camera" autoplay playsinline></video>


<div id="ui">
<button id="next">Следующий этап</button>
</div>

<script>

const startBtn = document.getElementById("start")
const video = document.getElementById("camera")

startBtn.onclick = async () => {

try{

const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

video.srcObject = stream
startBtn.style.display = "none"

}catch(e){

alert("Браузер не смог получить доступ к камере")

}

}

let step = 0

const stages = [

"Добро пожаловать на завод Центротех!",

"Ценность 1: Безопасность",

"Ценность 2: Ответственность",

"Ценность 3: Уважение",

"Ценность 4: Единая команда",

"Ценность 5: Эффективность",

"Ценность 6: На шаг впереди"

]

document.getElementById("next").onclick = () => {

step++

if(step < stages.length){

alert(stages[step])

}else{

alert("Экскурсия завершена!")

}

}

</script>

</body>
</html>
